<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced JavaScript Week 1 - Assignment Task 3</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Movies</h1>
    <p class="intro">
      Choose one button below for different options to display the movie list.
    </p>

    <div class="buttons">
      <button type="button" class="active" id="all-movies">
        Show all movies
      </button>
      <button type="button" id="short-title-movies">
        Movies with a short title
      </button>
      <button type="button" id="long-title-movies">
        Movies with a long title
      </button>
      <button type="button" id="1980s-movies">Movies made in 1980s</button>
      <button type="button" id="special-keyword-movies">
        Movies with special keywords
      </button>
      <button type="button" id="movies-with-duplicated-words-in-title">
        Movies with duplicated words in the title
      </button>
    </div>

    <div class="result-label" id="resultLabel">Result</div>
    <div id="result"></div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
