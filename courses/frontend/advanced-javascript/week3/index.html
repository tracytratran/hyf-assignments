<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Currency Calculator</title>
  </head>
  <body>
    <h1>Currency Calculator</h1>
    <form>
      <div class="currency-group">
        <label for="amount-from">From</label>
        <div class="input-card">
          <input type="number" id="amount-from" />
          <select name="currency-from" id="currency-from">
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
            <option value="AED">AED</option>
          </select>
        </div>
      </div>

      <div class="convert-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 50 50"
          width="50"
          height="50"
        >
          <circle cx="22" cy="22" r="22" fill="#ffffff" />
          <path
            transform="translate(13.5, 13.5)"
            fill="#000000"
            fill-rule="evenodd"
            d="M11.726 1.273l2.387 2.394H.667V5h13.446l-2.386 2.393.94.94 4-4-4-4-.94.94zM.666 12.333l4 4 .94-.94L3.22 13h13.447v-1.333H3.22l2.386-2.394-.94-.94-4 4z"
            clip-rule="evenodd"
          />
        </svg>
      </div>

      <div class="currency-group">
        <label for="amount-to">To</label>
        <div class="input-card">
          <input type="number" id="amount-to" />
          <select name="currency-to" id="currency-to">
            <option value="DKK">DKK</option>
            <option value="USD">USD</option>
            <option value="AED">AED</option>
          </select>
        </div>
      </div>
    </form>

    <script src="script.js"></script>
  </body>
</html>
