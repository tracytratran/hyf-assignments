<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Screenshot Generator</title>
  </head>
  <body class="flex-column items-center gap-2rem">
    <h1 class="title">Your Screenshot Generator</h1>

    <div class="screenshot-generator">
      <input type="text" placeholder="Enter your URL here" id="url" />
      <button class="generate-btn">Generate screenshot</button>
      <button class="list-all-btn">List all saved screenshots</button>
    </div>

    <div class="screenshot-container"></div>

    <div class="error-message hidden"></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
