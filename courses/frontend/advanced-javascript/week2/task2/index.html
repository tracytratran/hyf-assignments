<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Assignment</title>
  </head>
  <body>
    <section>
      <h3 class="margin-bottom-1rem">Functions</h3>
      <div class="flex-column margin-bottom-1rem">
        1. Display the text on the page 2.5 seconds after the script is loaded.
        <p class="display-after-2500ms"></p>
      </div>

      <div class="flex-column margin-bottom-1rem">
        2. Display the text on the page some delay seconds after the script is
        loaded.
        <p class="display-after-delay"></p>
      </div>

      <button class="display-after-delay-btn margin-bottom-1rem">Click</button>

      <div class="flex-column margin-bottom-1rem">
        4. Display planet
        <p class="planet"></p>
      </div>

      <div class="flex-column margin-bottom-1rem">
        5. Display location
        <p class="latitude"></p>
        <p class="longitude"></p>
      </div>

      <button class="location-btn margin-bottom-1rem">Log location</button>

      <div class="margin-bottom-1rem">
        <label for="delay">7. Delay time: </label>
        <input type="number" id="delay" />
        <button class="run-after-delay-btn">Run after delay</button>
        <p class="run-after-delay"></p>
        <p class="error-message"></p>
      </div>

      <div class="flex-column margin-bottom-1rem">
        8. Display text if a double click is detected
        <p class="double-click"></p>
      </div>

      <div class="flex-column margin-bottom-1rem">
        9. Display a joke (not sure if it is funny)
        <p class="joke"></p>
      </div>
    </section>
    <script src="index.js"></script>
  </body>
</html>
